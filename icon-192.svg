<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
    <linearGradient id="mask" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0c4ff"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="192" height="192" rx="40" ry="40" fill="url(#bg)"/>
  <!-- Outer glow -->
  <rect width="192" height="192" rx="40" ry="40" fill="none" stroke="#7c4dff" stroke-width="2" opacity="0.4"/>
  <!-- Theater/spy mask -->
  <g transform="translate(96,90)">
    <!-- Mask shape -->
    <path d="M-52,-20 C-52,-42 -30,-52 0,-52 C30,-52 52,-42 52,-20 C52,5 40,28 28,38 C20,44 10,46 0,40 C-10,46 -20,44 -28,38 C-40,28 -52,5 -52,-20Z" fill="url(#mask)" opacity="0.95"/>
    <!-- Left eye hole -->
    <ellipse cx="-22" cy="-12" rx="14" ry="10" fill="#0f0f1e"/>
    <!-- Right eye hole -->
    <ellipse cx="22" cy="-12" rx="14" ry="10" fill="#0f0f1e"/>
    <!-- Left eye glint -->
    <ellipse cx="-22" cy="-12" rx="12" ry="8" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.6"/>
    <!-- Right eye glint -->
    <ellipse cx="22" cy="-12" rx="12" ry="8" fill="none" stroke="#7c4dff" stroke-width="1.5" opacity="0.6"/>
    <!-- Nose ridge -->
    <path d="M0,-8 L0,10" stroke="#9a6ed8" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <!-- Subtle brow lines -->
    <path d="M-36,-22 C-30,-30 -14,-30 -8,-22" fill="none" stroke="#d1a8ff" stroke-width="1.5" opacity="0.3"/>
    <path d="M36,-22 C30,-30 14,-30 8,-22" fill="none" stroke="#d1a8ff" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Question mark (impostor element) -->
  <g transform="translate(140,148)">
    <text font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#7c4dff" text-anchor="middle" opacity="0.8">?</text>
  </g>
</svg>
