server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
